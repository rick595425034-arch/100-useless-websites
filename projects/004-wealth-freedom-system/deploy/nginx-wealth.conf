# wealth.aibrew.cn start
server {
    listen 80;
    server_name wealth.aibrew.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/wealth-freedom/acme;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wealth.aibrew.cn;
    root /var/www/wealth-freedom/current;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/wealth.aibrew.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wealth.aibrew.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
# wealth.aibrew.cn end
